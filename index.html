<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FAF7F2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Every Tracker">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
  <title>Every Tracker</title>
  <style>
    :root {
      --bg: #FAF7F2;
      --bg-card: #FFFFFF;
      --bg-subtle: #F3EEE4;
      --text: #2A2320;
      --text-muted: #7A6F64;
      --text-faint: #B8AEA1;
      --border: #E8DFD1;
      --accent: #2F6B3F;    /* Every green */
      --accent-soft: #E8F0EA;
      --warn: #D97706;
      --danger: #B23A3A;
      --planted: #8B5A3C;
      --shadow: 0 1px 3px rgba(42, 35, 32, 0.06), 0 4px 12px rgba(42, 35, 32, 0.04);
      --shadow-hover: 0 4px 12px rgba(42, 35, 32, 0.10), 0 12px 24px rgba(42, 35, 32, 0.06);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    input { font: inherit; color: inherit; }
    img { max-width: 100%; display: block; }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: calc(24px + var(--safe-bottom));
    }

    /* Header */
    .app-header {
      padding: 22px 20px 14px;
      text-align: left;
    }
    .app-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }
    .app-subtitle {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 2px;
    }

    /* Stats */
    .stats-header {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 0 20px 16px;
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 14px 10px;
      box-shadow: var(--shadow);
    }
    .stat { text-align: center; }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* Filter */
    .filter-bar {
      padding: 0 16px 14px;
    }
    .filter-group {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 0 4px 10px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .filter-group::-webkit-scrollbar { display: none; }
    .filter-label {
      font-size: 12px;
      color: var(--text-muted);
      align-self: center;
      flex: 0 0 auto;
      margin-right: 4px;
    }
    .chip {
      flex: 0 0 auto;
      padding: 6px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { border-color: var(--text-muted); }
    .chip.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 4px 0;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
    }
    .toggle-row input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--accent);
    }

    /* Category section */
    .category-section { margin-bottom: 24px; }
    .category-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--cat-color, var(--text-muted));
      padding: 0 20px 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .category-title .count {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-faint);
      font-weight: 400;
      letter-spacing: 0;
    }

    /* Grid */
    .bowls-grid-wrap { padding: 0 12px; }
    .bowls-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 0 8px;
    }

    /* Bowl card */
    .bowl-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .bowl-card:active { transform: scale(0.98); }
    .bowl-card.empty { opacity: 0.55; }
    .bowl-card.empty:hover, .bowl-card.empty:active { opacity: 1; }

    .bowl-img {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: var(--bg-subtle);
      overflow: hidden;
    }
    .bowl-img img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .bowl-img-placeholder {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      opacity: 0.3;
    }
    .bowl-qty-badge {
      position: absolute;
      top: 8px; right: 8px;
      min-width: 26px; height: 26px;
      padding: 0 8px;
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      backdrop-filter: blur(8px);
    }
    .bowl-qty-badge.has {
      background: rgba(47, 107, 63, 0.95);
      color: #fff;
    }
    .bowl-qty-badge.zero {
      background: rgba(255, 255, 255, 0.85);
      color: var(--text-faint);
    }

    .bowl-info {
      padding: 10px 12px 4px;
      flex: 1;
    }
    .bowl-name {
      font-weight: 600;
      font-size: 14px;
      line-height: 1.25;
      margin-bottom: 4px;
    }
    .bowl-macros {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .bowl-macros span:not(:last-child)::after {
      content: "·";
      margin-left: 8px;
      color: var(--text-faint);
    }
    .tag {
      display: inline-block;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-top: 6px;
      margin-right: 4px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .tag.planted { background: #F3E7DD; color: var(--planted); }
    .tag.mushroom { background: #F3EEE4; color: var(--text-muted); }
    .tag.excluded { background: #FAE8E8; color: var(--danger); }

    .bowl-actions {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    .qty-btn {
      flex: 1;
      padding: 10px;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-muted);
      border: none;
      background: transparent;
      transition: background 0.15s;
    }
    .qty-btn:hover:not(:disabled) { background: var(--bg-subtle); color: var(--accent); }
    .qty-btn:active:not(:disabled) { background: var(--accent-soft); }
    .qty-btn:disabled { color: var(--text-faint); cursor: not-allowed; }
    .qty-btn.minus { border-right: 1px solid var(--border); }

    /* Sheet */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(42, 35, 32, 0.4);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.2s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .sheet {
      width: 100%;
      max-width: 480px;
      max-height: 92vh;
      background: var(--bg);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.25s ease-out;
      overflow: hidden;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }
    .sheet-close {
      width: 32px; height: 32px;
      border-radius: 16px;
      background: var(--bg-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--text-muted);
    }
    .sheet-title {
      font-weight: 700;
      font-size: 17px;
      flex: 1;
    }
    .sheet-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px calc(30px + var(--safe-bottom));
      -webkit-overflow-scrolling: touch;
    }
    .sheet-img {
      width: 100%;
      aspect-ratio: 1;
      max-height: 260px;
      object-fit: cover;
      border-radius: var(--radius-md);
      margin-bottom: 12px;
    }
    .sheet-desc {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .stock-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--bg-card);
      border-radius: var(--radius-md);
      margin-bottom: 20px;
    }
    .stock-label {
      font-weight: 600;
      flex: 1;
    }
    .stock-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-subtle);
      border-radius: 999px;
      padding: 2px;
    }
    .stock-controls .qty-btn {
      padding: 6px 14px;
      border: none;
      min-width: 36px;
    }
    .stock-controls .qty-btn.minus { border-right: none; }
    .qty-display {
      min-width: 48px;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      padding: 6px 4px;
      cursor: text;
    }
    .qty-input {
      width: 48px;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      padding: 6px 4px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: #fff;
    }

    .sheet-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      color: var(--text-muted);
      margin: 24px 0 10px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .target-hint {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      color: var(--text-faint);
      margin-left: auto;
    }

    .macros-table {
      width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius-md);
      border-collapse: separate;
      border-spacing: 0;
      overflow: hidden;
      font-size: 13px;
    }
    .macros-table th, .macros-table td {
      padding: 10px 12px;
      text-align: right;
    }
    .macros-table th {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 11px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-subtle);
    }
    .macros-table th:first-child, .macros-table td:first-child {
      text-align: left;
      color: var(--text-muted);
    }
    .macros-table tbody tr:not(:last-child) td {
      border-bottom: 1px solid var(--border);
    }

    .combos-list {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .combo-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .combo-row:last-child { border-bottom: none; }
    .combo-name { font-weight: 500; }
    .combo-amount {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      color: var(--accent);
      min-width: 48px;
      text-align: right;
    }
    .combo-totals {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      font-size: 12px;
      min-width: 80px;
      font-variant-numeric: tabular-nums;
    }
    .combo-kcal.ok { color: var(--text); }
    .combo-kcal.off { color: var(--warn); }
    .combo-protein.ok { color: var(--accent); }
    .combo-protein.off { color: var(--warn); }

    .no-combos, .excluded-note, .empty-state {
      padding: 20px;
      text-align: center;
      color: var(--text-muted);
      background: var(--bg-card);
      border-radius: var(--radius-md);
      font-size: 14px;
    }
    .empty-hint {
      font-size: 12px;
      color: var(--text-faint);
      margin-top: 4px;
    }
    .empty-state { margin: 20px; padding: 40px 20px; }

    .loading {
      padding: 60px 20px;
      text-align: center;
      color: var(--text-muted);
    }

    /* Mobile touch targets */
    @media (hover: none) {
      .bowl-card:hover { box-shadow: var(--shadow); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">Lade Bowls...</div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
